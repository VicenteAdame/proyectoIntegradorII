<div class="card mt-4 shadow">
    <div class="card-header bg-success text-white">
        <h3 class="mb-0 text-center">Registro de Empleado</h3>
    </div>
    <div class="card-body">
        <ul class="nav nav-tabs" id="empleadoTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="listado-tab" data-bs-toggle="tab" data-bs-target="#listado"
                    type="button" role="tab" aria-controls="listado" aria-selected="true">Listado</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="registrar-tab" data-bs-toggle="tab" data-bs-target="#registrar"
                    type="button" role="tab" aria-controls="registrar" aria-selected="false">Registrar</button>
            </li>
        </ul>


        <div class="tab-content border border-top-0 p-3" id="empleadoTabsContent">
            <!-- Pestaña de Listado -->
            <div class="tab-pane fade show active" id="listado" role="tabpanel" aria-labelledby="listado-tab">
                <div class="d-flex justify-content-between mb-3 align-items-end">
                    <div class="d-flex gap-2 align-items-center">
                        <label for="buscar" class="form-label mb-0 fw-bold">Nombre:</label>
                        <input type="text" class="form-control" id="buscar" placeholder="Buscar empleado...">
                        <button class="btn btn-outline-secondary" type="button">Buscar</button>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" (click)="cancelarEdicion()">Nuevo</button>
                    </div>
                </div>




                <div class="table-responsive mb-3">
                    <table class="table table-bordered table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Nomina</th>
                                <th>Nombre</th>
                                <th>A. Paterno</th>
                                <th>A. Materno</th>
                                <th>Rol</th>
                                <th>Estado</th>
                                <th>Contraseña</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let emp of empleados$ | async">
                                <td>{{emp.nomina}}</td>
                                <td>{{emp.nombre}}</td>
                                <td>{{emp.apellidoPaterno}}</td>
                                <td>{{emp.apellidoMaterno}}</td>
                                <td>{{emp.rol}}</td>
                                <td>
                                    <span class="badge" [ngClass]="emp.estado ? 'bg-success' : 'bg-secondary'">
                                        {{ emp.estado ? 'Activo' : 'Inactivo' }}
                                    </span>
                                </td>
                                <td>{{emp.contrasena}}</td>
                                <td class="d-flex gap-1 justify-content-center">
                                    <button class="btn btn-sm btn-warning" (click)="editarEmpleado(emp)" title="Editar">
                                        Editar
                                    </button>
                                    <button class="btn btn-sm" [ngClass]="emp.estado ? 'btn-secondary' : 'btn-success'"
                                        (click)="toggleEstado(emp)" title="Cambiar Estado">
                                        {{ emp.estado ? 'Desactivar' : 'Activar' }}
                                    </button>
                                    <button class="btn btn-sm btn-danger" (click)="eliminarEmpleado(emp.id!)"
                                        title="Eliminar">
                                        Eliminar
                                    </button>
                                </td>
                            </tr>


                        </tbody>
                    </table>
                </div>





                <div class="d-flex justify-content-end align-items-center">
                    <span class="text-muted">Mostrando: {{ (empleados$ | async)?.length || 0 }} empleados</span>
                </div>
            </div>

            <!-- Pestaña de Registrar -->
            <div class="tab-pane fade" id="registrar" role="tabpanel" aria-labelledby="registrar-tab">
                <form class="row g-3" [formGroup]="empleadoForm" (ngSubmit)="guardarEmpleado()">
                    <div class="col-md-6">
                        <label for="nomina" class="form-label fw-bold">1.- Ingrese Nomina:</label>
                        <input type="text" class="form-control" id="nomina" formControlName="nomina">
                    </div>
                    <div class="col-md-6">
                        <label for="nombre" class="form-label fw-bold">2.- Ingrese Nombre:</label>
                        <input type="text" class="form-control" id="nombre" formControlName="nombre">
                    </div>

                    <div class="col-md-6">
                        <label for="apellidoPaterno" class="form-label fw-bold">3.- Ingrese Apellido Paterno:</label>
                        <input type="text" class="form-control" id="apellidoPaterno" formControlName="apellidoPaterno">
                    </div>
                    <div class="col-md-6">
                        <label for="apellidoMaterno" class="form-label fw-bold">4.- Ingrese Apellido Materno:</label>
                        <input type="text" class="form-control" id="apellidoMaterno" formControlName="apellidoMaterno">
                    </div>

                    <div class="col-md-6">
                        <label for="rol" class="form-label fw-bold">5.- Seleccione Rol:</label>
                        <select class="form-select" id="rol" formControlName="rol">
                            <option value="Empleado">Empleado</option>
                            <option value="Administrador">Administrador</option>
                        </select>
                    </div>

                    <div class="col-md-6 d-flex align-items-center mt-5">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="estado" formControlName="estado">
                            <label class="form-check-label fw-bold" for="estado">
                                Empleado Activo
                            </label>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="contraseña" class="form-label fw-bold">7.- Ingrese Contraseña:</label>
                        <input type="password" class="form-control" id="contraseña" formControlName="contrasena">
                    </div>

                    <div class="col-12 text-center mt-4">
                        <button type="submit" class="btn btn-primary px-4 me-3" [disabled]="empleadoForm.invalid">
                            {{ isEditing ? 'Actualizar' : 'Guardar' }}
                        </button>
                        <button type="button" class="btn btn-secondary px-4"
                            (click)="cancelarEdicion()">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
