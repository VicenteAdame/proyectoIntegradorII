<div class="login-page d-flex align-items-center justify-content-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card shadow border-0">
          <div class="card-header text-center bg-primary text-white">
            <h4 class="mb-0">Inicio de sesión</h4>
          </div>
          <div class="card-body">
            <form (ngSubmit)="onSubmit()" novalidate>
              <div class="mb-3">
                <label for="nomina" class="form-label fw-semibold">ID o Nómina</label>
                <input
                  id="nomina"
                  name="nomina"
                  type="text"
                  class="form-control"
                  [(ngModel)]="nomina"
                  [class.is-invalid]="mostrandoErrores && !nomina.trim()"
                  placeholder="Ej. A001"
                  autocomplete="username"
                />
                <div class="invalid-feedback">
                  Campo obligatorio.
                </div>
              </div>

              <div class="mb-3">
                <label for="contrasena" class="form-label fw-semibold">Contraseña</label>
                <input
                  id="contrasena"
                  name="contrasena"
                  type="password"
                  class="form-control"
                  [(ngModel)]="contrasena"
                  [class.is-invalid]="mostrandoErrores && !contrasena.trim()"
                  placeholder="••••••••"
                  autocomplete="current-password"
                />
                <div class="invalid-feedback">
                  Campo obligatorio.
                </div>
              </div>

              <div *ngIf="mostrandoErrores && mensajeError" class="alert alert-danger py-2">
                {{ mensajeError }}
              </div>

              <div class="d-grid mt-4">
                <button
                  type="submit"
                  class="btn btn-primary btn-lg"
                  [disabled]="enviando"
                >
                  <span *ngIf="!enviando">Iniciar sesión</span>
                  <span *ngIf="enviando" class="spinner-border spinner-border-sm" aria-hidden="true"></span>
                </button>
              </div>
            </form>
          </div>
          <!-- <div class="card-footer text-center small text-muted">
            Usa <strong>A001 / admin123</strong> (Administrador) o <strong>E001 / empleado123</strong> (Empleado)
          </div> -->
        </div>
      </div>
    </div>
  </div>
</div>
